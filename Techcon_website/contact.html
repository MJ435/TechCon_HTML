        <section>
            <h2>Contact Information</h2>
            <p>Email: <a href="mailto:joemic435@gmail.com">joemic435@gmail.com</a></p>
            <p>Follow us on social media:</p>
            <ul>
                <li><a href="https://www.twitter.com/techcon" target="_blank">Twitter</a></li>
                <li><a href="https://www.facebook.com/techcon" target="_blank">Facebook</a></li>
                <li><a href="https://www.linkedin.com/company/techcon" target="_blank">LinkedIn</a></li>
            </ul>
            <h2>Venue Location</h2>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.0864455123247!2d144.95373531531784!3d-37.81627977975195!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad642af0f11fd81%3A0x5045675218cee40!2sTechCon+Conference+Center!5e0!3m2!1sen!2sus!4v1549447083447"

            </iframe>
        </section>
        <section>
            <h2>Contact Us Form</h2>
            <form action="/submit_contact" method="post">
                <div>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <div>
                    <button type="submit">Send Message</button>
                </div>
            </form>
        </section>
    </main>
